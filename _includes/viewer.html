<!--
  Story Viewer Stage

  The visual half of a story page — the area where the object being discussed is
  shown and animated as the reader scrolls. Almost nothing here is authored
  statically: the empty #viewer-cards-container is a stage onto which card-pool.js
  builds, layers, and tears down individual viewer cards at runtime, one per object
  the story brings into view, so that transitions between objects can cross-fade
  rather than reload. This include therefore ships mostly as scaffolding plus the
  two persistent chrome elements that float over that stage.

  The first is the info overlay (top-left, desktop only) — a small dark panel whose
  #current-object-title is rewritten by the viewer code to name whichever object is
  currently in focus. The second is the credits badge (bottom-left), revealed and
  populated by the viewer when an object carries attribution; its dismiss button
  lets a reader clear it for an unobstructed view. The scoped <style> block kept
  inline here covers only the positioning and the responsive (mobile-truncating)
  behaviour of these two overlays; the look of the viewer cards themselves lives in
  telar.scss, since those elements do not exist until card-pool.js creates them.
-->
<!-- Viewer Cards Container - cards will be dynamically created here -->
<div id="viewer-cards-container" style="position: relative; width: 100%; height: 100%;"></div>

<!-- Viewer Controls Overlay (optional custom controls) -->
<div class="viewer-overlay d-none d-md-block">
  <div class="viewer-info p-3 text-white bg-dark bg-opacity-75 rounded m-3">
    <small id="current-object-title">Loading...</small>
  </div>
</div>

<!-- Object Credits Badge (bottom-left, dismissable) -->
<div id="object-credits-badge" class="object-credits-badge d-none">
  <span id="object-credits-text"></span>
  <button id="object-credits-dismiss" class="credits-dismiss-btn" aria-label="Dismiss credits">×</button>
</div>

<style>
  .viewer-overlay {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 1000;
  }

  .viewer-info {
    pointer-events: auto;
  }

  /* Viewer Card Styling - main styles in telar.scss */
  .viewer-card {
    background: #000;
  }

  .viewer-instance {
    width: 100%;
    height: 100%;
  }

  /* Object Credits Badge */
  .object-credits-badge {
    position: absolute;
    bottom: 0;
    left: 0;
    padding: 0.5rem 0.75rem;
    background: rgba(33, 37, 41, 0.75); /* Match step number badge (bg-dark bg-opacity-75) */
    color: white;
    border-radius: 0.25rem;
    margin: 1rem;
    font-size: 0.75rem;
    z-index: 1000;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    max-width: calc(100% - 2rem);
  }

  /* Mobile-specific adjustments */
  @media (max-width: 767px) {
    .object-credits-badge {
      font-size: 0.65rem;
      padding: 0.4rem 0.6rem;
      margin: 0.5rem;
      max-width: calc(100% - 1rem);
    }

    #object-credits-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 5rem);
    }

    .credits-dismiss-btn {
      flex-shrink: 0;
    }
  }

  .credits-dismiss-btn {
    background: none;
    border: none;
    color: white;
    font-size: 1.25rem;
    line-height: 1;
    padding: 0;
    margin: 0 0 0 0.5rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  @media (hover: hover) and (pointer: fine) {
    .credits-dismiss-btn:hover {
      opacity: 1;
    }
  }
</style>
