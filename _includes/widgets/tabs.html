<!--
  Tabs Widget

  Renders a set of tabbed panels — a Bootstrap tab group — so that parallel pieces
  of content can share one footprint and the reader switches between them. Produced
  by Telar's widget build step, which supplies widget_id (a unique slug scoping
  every tab's id and aria target so several tab groups never collide) and tabs (a
  list, each with a title for the nav button and a pre-rendered content_html for the
  pane). The pane HTML is emitted through the "safe" filter because the build step
  has already escaped it; loop.index distinguishes the tabs, and the first tab is
  marked active and shown by default.
-->
<div class="telar-widget telar-widget-tabs">
  <!-- Tab navigation -->
  <ul class="nav nav-tabs" role="tablist">
    {% for tab in tabs %}
    <li class="nav-item" role="presentation">
      <button class="nav-link {% if loop.first %}active{% endif %}"
              id="tab-{{ widget_id }}-{{ loop.index }}-tab"
              data-bs-toggle="tab"
              data-bs-target="#tab-{{ widget_id }}-{{ loop.index }}"
              type="button"
              role="tab"
              aria-controls="tab-{{ widget_id }}-{{ loop.index }}"
              {% if loop.first %}aria-selected="true"{% else %}aria-selected="false"{% endif %}>
        {{ tab.title }}
      </button>
    </li>
    {% endfor %}
  </ul>

  <!-- Tab content -->
  <div class="tab-content">
    {% for tab in tabs %}
    <div class="tab-pane fade {% if loop.first %}show active{% endif %}"
         id="tab-{{ widget_id }}-{{ loop.index }}"
         role="tabpanel"
         aria-labelledby="tab-{{ widget_id }}-{{ loop.index }}-tab">
      <div class="tab-pane-content">
        {{ tab.content_html | safe }}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
